# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "4.0"
metadata:
  name: test.t1.test.inventory
type: application
framework:
  name: SAPUI5
  version: 1.148.1
  libraries:
    - name: sap.m
    - name: sap.ui.core
    - name: sap.f
    - name: sap.ui.layout
    - name: sap.tnt
    - name: sap.ui.vk
